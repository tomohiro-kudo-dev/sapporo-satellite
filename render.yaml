services:
  # ===== バックエンド (FastAPI) =====
  - type: web
    name: sapporo-satellite-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CDSE_USER
        sync: false   # Renderダッシュボードで手動入力
      - key: CDSE_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://sapporo-satellite.onrender.com
    disk:
      name: satellite-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 5

  # ===== フロントエンド (Next.js) =====
  - type: web
    name: sapporo-satellite
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sapporo-satellite-api.onrender.com
      - key: NODE_VERSION
        value: "20"
